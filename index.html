<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V2追涨策略 · 实时盯盘</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#0a0e27;color:#e1e5f2;padding:12px;min-height:100vh;line-height:1.5}
@media(min-width:768px){body{padding:20px}}
.nav{display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.nav a{display:inline-block;padding:8px 16px;border-radius:8px;text-decoration:none;color:#8892b0;font-size:13px;border:1px solid #2d3561;background:#1a1f3a;transition:.2s}
.nav a:hover,.nav a.active{background:#2d3561;color:#00d4ff;border-color:#00d4ff}
.nav a.yk:hover,.nav a.yk.active{color:#ff9f43;border-color:#ff9f43}
.hdr{text-align:center;padding:16px 12px;background:linear-gradient(135deg,#1a1f3a,#2d3561);border-radius:12px;margin-bottom:14px;border:1px solid #3d4663}
.hdr h1{font-size:20px;color:#00d4ff;margin-bottom:4px}
@media(min-width:768px){.hdr h1{font-size:26px}}
.hdr .sub{color:#8892b0;font-size:12px}
.hdr .src{color:#64ffda;font-size:11px;margin-top:4px}
.bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:linear-gradient(135deg,#151929,#1a1f3a);border-radius:10px;margin-bottom:14px;border:1px solid #2d3561;flex-wrap:wrap;gap:8px}
.bar .item{display:flex;align-items:center;gap:6px;font-size:12px}
.bar .dot{width:9px;height:9px;border-radius:50%;animation:pulse 2s infinite}
.bar .dot.on{background:#64ffda;box-shadow:0 0 6px rgba(100,255,218,.4)}
.bar .dot.off{background:#ff6b6b;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.bar button{background:linear-gradient(135deg,#00d4ff,#0099cc);color:#fff;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:bold}
.sum{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.sum-item{background:linear-gradient(135deg,#1a1f3a,#151929);border-radius:10px;padding:12px;text-align:center;border:1px solid #2d3561}
.sum-val{font-size:24px;font-weight:bold;font-family:'Consolas',monospace}
.sum-lbl{font-size:11px;color:#8892b0;margin-top:2px}
.grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:14px}
@media(min-width:900px){.grid{grid-template-columns:repeat(3,1fr)}}
.card{background:linear-gradient(135deg,#1a1f3a,#151929);border-radius:12px;padding:14px;border:1px solid #2d3561}
.card h2{font-size:13px;color:#8892b0;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #2d3561}
.metric{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1a1f3a;font-size:13px}
.metric:last-child{border-bottom:none}
.m-lbl{color:#8892b0}
.m-val{font-weight:bold;font-family:'Consolas',monospace}
.c-pos{color:#ff4d4f}.c-neg{color:#52c41a}.c-neu{color:#e1e5f2}
.sig-sec{margin-top:12px}
.sig-card{background:linear-gradient(135deg,#1a1f3a,#151929);border-radius:12px;padding:14px;border:1px solid #2d3561;margin-bottom:12px}
.sig-card h2{font-size:14px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #2d3561}
.sig-card.buy h2{color:#ff4d4f}
.sig-card.sell h2{color:#52c41a}
.sig-card.warn h2{color:#ffd93d}
.sig-item{background:linear-gradient(135deg,#0f1629,#141b33);border-radius:10px;padding:12px;margin-bottom:8px;border-left:4px solid #ff4d4f;transition:transform .2s}
.sig-item:hover{transform:translateX(3px)}
.sig-item.sell{border-left-color:#52c41a}
.sig-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px}
.sig-name{font-size:15px;font-weight:bold;color:#fff}
.sig-gain{padding:2px 10px;border-radius:6px;font-size:14px;font-weight:bold;font-family:'Consolas',monospace}
.g-up{background:rgba(255,77,79,.12);color:#ff4d4f}
.g-dn{background:rgba(82,196,26,.12);color:#52c41a}
.sig-detail{font-size:12px;color:#8892b0;line-height:1.8}
.sig-detail b{color:#ccd6f6;font-weight:normal}
.sig-action{font-size:11px;color:#ff4d4f;margin-top:6px;padding-top:6px;border-top:1px dashed #2d3561}
.sig-item.sell .sig-action{color:#52c41a}
.near-row{display:flex;justify-content:space-between;align-items:center;background:#0f1629;border-radius:8px;padding:8px 12px;margin-bottom:5px;border-left:3px solid #ffd93d}
.near-name{font-size:13px;font-weight:bold;color:#ccd6f6}
.near-gain{font-size:13px;font-weight:bold;color:#ffd93d;font-family:Consolas}
.sec-list{max-height:240px;overflow-y:auto}
.sec-item{background:#0f1629;border-radius:8px;padding:8px;margin-bottom:5px}
.sec-row{display:flex;justify-content:space-between;align-items:center}
.sec-name{font-size:12px;font-weight:bold;color:#ccd6f6}
.sec-gain{font-size:12px;font-weight:bold;font-family:Consolas}
.sec-tag{font-size:10px;padding:1px 6px;border-radius:4px;margin-left:5px}
.tag-hot{background:rgba(255,77,79,.12);color:#ff4d4f}
.tag-ok{background:rgba(136,146,176,.12);color:#8892b0}
.tag-cold{background:rgba(82,196,26,.12);color:#52c41a}
.empty{text-align:center;padding:18px;color:#5a6380;font-size:12px}
.toast{position:fixed;top:16px;right:16px;background:linear-gradient(135deg,#1a1f3a,#2d3561);color:#64ffda;padding:8px 16px;border-radius:8px;border:1px solid #64ffda;font-size:12px;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#3d4663;border-radius:2px}
</style>
</head>
<body>
<div class="nav">
  <a href="#" class="active">🟢 湖北池 (18只)</a>
  <a href="index_yangkai.html" class="yk">🔶 杨凯池 (24板块)</a>
  <a href="postmarket.html">📊 盘后总结</a>
</div>
<div class="hdr">
  <h1>📊 V2追涨策略 · 实时盯盘</h1>
  <div class="sub">湖北18只股票池 · 事件驱动型短线追涨</div>
  <div class="src" id="srcLabel"></div>
  <div style="color:#64ffda;font-size:11px;margin-top:4px;font-family:Consolas" id="updTime"></div>
</div>
<div class="bar">
  <div class="item"><div class="dot" id="stDot"></div><span id="stText">--</span></div>
  <div class="item">资产：<span id="stAsset" style="color:#00d4ff;font-weight:bold">--</span></div>
  <div class="item">盈亏：<span id="stPnl" style="font-weight:bold">--</span></div>
  <button onclick="doRefresh()">🔄 刷新</button>
</div>
<div class="sum" id="sumBar"></div>
<div class="grid">
  <div class="card"><h2>💰 账户状态</h2><div id="accBody"></div></div>
  <div class="card"><h2>📡 扫描统计</h2><div id="scanBody"></div></div>
  <div class="card"><h2>📈 板块涨幅排行</h2><div class="sec-list" id="secList"></div></div>
</div>
<div class="sig-sec">
  <div class="sig-card buy"><h2>🟢 买入信号 (Buy Signals)</h2><div id="buyList"></div></div>
</div>
<div class="sig-sec" id="nearSec" style="display:none">
  <div class="sig-card warn"><h2>⚠️ 接近买入阈值 (&gt;3%)</h2><div id="nearList"></div></div>
</div>
<div class="sig-sec">
  <div class="sig-card sell"><h2>🔴 卖出信号 (Sell Signals)</h2><div id="sellList"><div class="empty">暂无卖出信号</div></div></div>
</div>
<div class="toast" id="toast"></div>
<script>
var EMBED = {"last_update":"2026-06-26 20:23:00","market_status":"收盘","current_time":"20:23","data_source":"新浪财经","account":{"total_assets":261240,"available_cash":130000,"positions":[],"total_return":7837.2,"return_pct":3.05},"hubei_pool":{"total_stocks":18,"scanned":16,"buy_signals":[{"code":"603281","name":"江瀚新材","price":42.13,"change_pct":7.15,"sector":"精细化工","sector_change":7.15,"suggestion":"板块共振强势，建议50%仓位关注","reason":"精细化工板块，个股涨幅7.15%，符合V2买入条件（新浪数据）"}],"near_threshold":[],"all_stocks":[{"code":"603281","name":"江瀚新材","price":42.13,"change_pct":7.15,"sector":"精细化工"},{"code":"600141","name":"兴发集团","price":48.8,"change_pct":2.78,"sector":"精细化工"}]},"scan_summary":{"total_scanned":16,"hubei_buy_signals":1}};
var D = EMBED;
function fmt(v){if(v===undefined||v===null) return '¥--'; return '¥'+(parseFloat(v)||0).toLocaleString('zh-CN',{maximumFractionDigits:0});}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'):'';}
function render(d){
  if(!d) return; D=d;
  var ms=d.market_status||'';
  document.getElementById('stDot').className = ms==='交易中'?'dot on':'dot off';
  document.getElementById('stText').textContent = ms==='交易中'?'🟢 交易中':'⚫ '+ms;
  document.getElementById('updTime').textContent = '✅ '+(d.last_update||'');
  document.getElementById('srcLabel').textContent = '📡 数据源：'+(d.data_source||'未知');
  var a=d.account||{};
  document.getElementById('stAsset').textContent = fmt(a.total_assets);
  var rp=a.return_pct||0, tr=a.total_return||0;
  var pnlEl=document.getElementById('stPnl');
  pnlEl.textContent=(tr>=0?'+':'')+'¥'+Math.abs(tr).toFixed(0);
  pnlEl.style.color=tr>=0?'#ff4d4f':'#52c41a';
  document.getElementById('accBody').innerHTML=m('总资产',fmt(a.total_assets))+m('现金',fmt(a.available_cash))+m('持仓市值',fmt((a.positions||[]).reduce(function(s,p){return s+(p.market_value||0)},0)))+m('收益率',(rp>=0?'+':'')+rp.toFixed(2)+'%',rp>=0?'c-pos':'c-neg');
  var hb=(d.hubei_pool||{});
  document.getElementById('scanBody').innerHTML=m('已扫描',(hb.scanned||0)+'/'+(hb.total_stocks||18))+m('🟢 买入信号',(d.scan_summary||{}).hubei_buy_signals||0,'c-pos')+m('🔴 卖出信号','0','c-neg')+m('⚠️ 接近阈值',(hb.near_threshold||[]).length,'c-neu');
  document.getElementById('sumBar').innerHTML=sm('🎯 买入信号',(d.scan_summary||{}).hubei_buy_signals||0,'c-pos')+sm('📡 已扫描',(hb.scanned||0),'c-neu')+sm('📈 上涨股',(hb.all_stocks||[]).length,'c-pos')+sm('⏰ 状态',ms==='交易中'?'交易中':'收盘','c-neu');
  var buys=hb.buy_signals||[];
  document.getElementById('buyList').innerHTML=buys.length===0?'<div class="empty">暂无买入信号 · 继续等待大阳线 📈</div>':buys.map(function(s){var g=s.change_pct||0,gc=g>=0?'g-up':'g-dn';return '<div class="sig-item"><div class="sig-hd"><div class="sig-name">🟢 '+esc(s.name)+' ('+esc(s.code)+')</div><div class="sig-gain '+gc+'">'+(g>0?'+':'')+g.toFixed(2)+'%</div></div><div class="sig-detail">💰 价格：<b>'+(s.price||0).toFixed(2)+'</b> | 📊 板块：<b>'+esc(s.sector||'--')+'</b></div><div class="sig-action">💡 次日止盈 +5%~+10% · 止损 -5%</div></div>';}).join('');
  var nears=hb.near_threshold||[];
  var ns=document.getElementById('nearSec');
  if(nears.length===0){ns.style.display='none'}else{ns.style.display='block';document.getElementById('nearList').innerHTML=nears.map(function(n){return '<div class="near-row"><div><span class="near-name">'+esc(n.name)+' ('+esc(n.code)+')</span><span style="color:#5a6380;font-size:11px;margin-left:6px">'+esc(n.note||'')+'</span></div><span class="near-gain">'+(n.change_pct>0?'+':'')+n.change_pct.toFixed(2)+'%</span></div>';}).join('');}
  var secs=hb.sector_performance||[];
  if(secs.length){var sl=secs.slice().sort(function(a,b){return (b.change||0)-(a.change||0)});document.getElementById('secList').innerHTML=sl.map(function(sc){var ch=sc.change||0,cc=ch>=0?'c-pos':'c-neg',tc=ch>=3?'tag-hot':ch<0?'tag-cold':'tag-ok';return '<div class="sec-item"><div class="sec-row"><div class="sec-name">'+esc(sc.sector)+' <span class="sec-tag '+tc+'">'+(ch>=3?'强势':ch>0?'上涨':'下跌')+'</span></div><div class="sec-gain '+cc+'">'+(ch>=0?'+':'')+ch.toFixed(2)+'%</div></div></div>';}).join('');}
}
function m(lbl,val,cls){return '<div class="metric"><span class="m-lbl">'+lbl+'</span><span class="m-val '+(cls||'c-neu')+'">'+val+'</span></div>';}
function sm(lbl,val,cls){return '<div class="sum-item"><div class="sum-val '+(cls||'c-neu')+'">'+val+'</div><div class="sum-lbl">'+lbl+'</div></div>';}
function doRefresh(){
  showToast('正在刷新...');
  fetch('https://lawrda.github.io/stock-watchboard/dashboard_data.json?t='+Date.now(),{cache:'no-cache'}).then(function(r){if(!r.ok)throw 0;return r.json();}).then(function(d){D=d;render(d);showToast('✅ 数据已更新！');}).catch(function(){fetch('dashboard_data.json?t='+Date.now(),{cache:'no-cache'}).then(function(r){if(!r.ok)throw 0;return r.json();}).then(function(d){D=d;render(d);showToast('✅ 本地数据已更新！');}).catch(function(){showToast('❌ 无法获取最新数据');});});
}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500);}
render(D);doRefresh();setInterval(doRefresh,30000);
</script>
</body>
</html>
