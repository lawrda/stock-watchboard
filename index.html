<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V2追涨策略 - 实时盯盘</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #21262d;
            margin-bottom: 20px;
        }
        
        .header h1 { font-size: 24px; color: #58a6ff; }
        
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-dot.trading { background: #3fb950; }
        .status-dot.closed { background: #f85149; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .update-time {
            color: #8b949e;
            font-size: 14px;
        }
        
        .refresh-btn {
            background: #238636;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .refresh-btn:hover { background: #2ea043; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 15px;
        }
        
        .stat-label {
            color: #8b949e;
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }
        
        .section {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #58a6ff;
        }
        
        .position-item, .signal-item {
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }
        
        .position-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .stock-name { font-weight: bold; }
        .stock-code { color: #8b949e; margin-left: 8px; }
        
        .pnl-positive { color: #f85149; }
        .pnl-negative { color: #3fb950; }
        
        .position-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
            font-size: 14px;
            color: #8b949e;
        }
        
        .pool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
        }
        
        .pool-item {
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 6px;
            padding: 10px;
            font-size: 14px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }
        
        .error {
            background: #161b22;
            border: 1px solid #f85149;
            border-radius: 8px;
            padding: 20px;
            color: #f85149;
            text-align: center;
        }
        
        .auto-refresh {
            color: #8b949e;
            font-size: 12px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 V2追涨策略 · 实时盯盘</h1>
            <div class="status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">加载中...</span>
                <span class="update-time" id="updateTime"></span>
                <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
            </div>
        </div>
        
        <div id="content">
            <div class="loading">正在加载数据...</div>
        </div>
        
        <div class="auto-refresh">
            自动刷新间隔：5分钟 | 最后更新：<span id="lastUpdate">--</span>
        </div>
    </div>
    
    <script>
        const DATA_URL = 'dashboard_data.json';
        const REFRESH_INTERVAL = 5 * 60 * 1000; // 5分钟
        
        let refreshTimer = null;
        
        // 判断是否在交易时段
        function isTradingTime() {
            const now = new Date();
            const day = now.getDay();
            if (day === 0 || day === 6) return false; // 周末
            
            const hour = now.getHours();
            const minute = now.getMinutes();
            const time = hour * 100 + minute;
            
            return (time >= 915 && time <= 1130) || (time >= 1300 && time <= 1500);
        }
        
        // 格式化百分比
        function formatPct(val) {
            if (val === null || val === undefined) return '--';
            const v = parseFloat(val);
            const sign = v >= 0 ? '+' : '';
            return `${sign}${v.toFixed(2)}%`;
        }
        
        // 格式化金额
        function formatMoney(val) {
            if (val === null || val === undefined) return '--';
            return parseFloat(val).toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        }
        
        // 加载数据
        async function loadData() {
            try {
                const response = await fetch(`${DATA_URL}?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error('数据加载失败');
                
                const data = await response.json();
                renderData(data);
                
                // 更新状态
                updateStatus(data);
                
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <h3>⚠️ 数据加载失败</h3>
                        <p>请检查网络连接或稍后重试</p>
                        <p style="font-size: 12px; margin-top: 10px;">${error.message}</p>
                    </div>
                `;
            }
        }
        
        // 更新状态
        function updateStatus(data) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const time = document.getElementById('updateTime');
            const lastUpdate = document.getElementById('lastUpdate');
            
            const trading = isTradingTime();
            dot.className = `status-dot ${trading ? 'trading' : 'closed'}`;
            text.textContent = trading ? '🟢 交易中' : '🔴 已收盘';
            
            if (data.last_update) {
                time.textContent = data.last_update;
                lastUpdate.textContent = data.last_update;
            }
        }
        
        // 渲染数据
        function renderData(data) {
            const account = data.account || {};
            const positions = account.positions || [];
            const hubeiPool = data.hubei_pool || {};
            
            let html = '';
            
            // 账户概览
            html += `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">总资产</div>
                        <div class="stat-value">¥${formatMoney(account.total_assets)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">可用资金</div>
                        <div class="stat-value">¥${formatMoney(account.available_cash)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">持仓市值</div>
                        <div class="stat-value">¥${formatMoney(account.total_market_value)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">已实现盈亏</div>
                        <div class="stat-value ${account.total_return >= 0 ? 'pnl-positive' : 'pnl-negative'}">
                            ${formatPct(account.return_pct)}
                        </div>
                    </div>
                </div>
            `;
            
            // 当前持仓
            html += '<div class="section"><div class="section-title">📊 当前持仓</div>';
            if (positions.length === 0) {
                html += '<div style="color: #8b949e; padding: 20px;">当前无持仓</div>';
            } else {
                positions.forEach(pos => {
                    const pnlClass = pos.current_pnl >= 0 ? 'pnl-positive' : 'pnl-negative';
                    html += `
                        <div class="position-item">
                            <div class="position-header">
                                <div>
                                    <span class="stock-name">${pos.name}</span>
                                    <span class="stock-code">${pos.code}</span>
                                </div>
                                <div class="${pnlClass}" style="font-weight: bold;">
                                    ${formatPct(pos.current_pnl_pct)}
                                </div>
                            </div>
                            <div class="position-details">
                                <div>成本: ¥${pos.buy_price?.toFixed(2)}</div>
                                <div>现价: ¥${pos.current_price?.toFixed(2)}</div>
                                <div>数量: ${pos.buy_qty}股</div>
                                <div>持仓: ${pos.hold_days || 0}天</div>
                            </div>
                        </div>
                    `;
                });
            }
            html += '</div>';
            
            // 湖北池
            html += '<div class="section"><div class="section-title">🏠 湖北池</div>';
            const stocks = hubeiPool.stocks || [];
            if (stocks.length === 0) {
                html += '<div style="color: #8b949e; padding: 20px;">暂无数据</div>';
            } else {
                html += '<div class="pool-grid">';
                stocks.forEach(stock => {
                    const chg = stock.change_pct || 0;
                    const chgClass = chg >= 0 ? 'pnl-positive' : 'pnl-negative';
                    html += `
                        <div class="pool-item">
                            <div style="font-weight: bold;">${stock.name} <span style="color: #8b949e;">${stock.code}</span></div>
                            <div style="margin-top: 5px;">
                                <span>¥${stock.price?.toFixed(2)}</span>
                                <span class="${chgClass}" style="margin-left: 10px;">${formatPct(chg)}</span>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
            }
            html += '</div>';
            
            document.getElementById('content').innerHTML = html;
        }
        
        // 初始化
        function init() {
            loadData();
            
            // 设置定时刷新
            refreshTimer = setInterval(loadData, REFRESH_INTERVAL);
            
            console.log('V2盯盘系统已启动，刷新间隔：', REFRESH_INTERVAL / 1000, '秒');
        }
        
        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
