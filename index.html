var DATA = null;
try {
    function decodeB64Utf8(b64) {
        var bin = atob(b64);
        var bytes = new Uint8Array(bin.length);
        for (var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
        return new TextDecoder("utf-8").decode(bytes);
    }
    DATA = JSON.parse(decodeB64Utf8(DATA_B64));
    console.log("数据加载成功", DATA.last_update);
    render(DATA);
} catch(e) {
    document.getElementById("app").innerHTML = "数据解析错误: " + e;
    console.error(e);
}

function render(d) {
    var h = "";
    
    // 账户
    h += '<div class="card"><h2>账户概览</h2>';
    h += '<div class="metric"><div class="label">总资产</div><div class="value">¥' + (d.account.total_assets||0).toFixed(0) + '</div></div>';
    h += '<div class="metric"><div class="label">可用</div><div class="value">¥' + (d.account.available_cash||0).toFixed(0) + '</div></div>';
    h += '<div class="metric"><div class="label">收益</div><div class="value ' + ((d.account.return_pct||0)>=0?"up":"dn") + '">' + ((d.account.return_pct||0)>=0?"+":"") + (d.account.return_pct||0).toFixed(2) + '%</div></div>';
    h += '</div>';
    
    // 大盘
    h += '<div class="card"><h2>大盘: <span class="' + (d.market_chg_pct>=0?"up":"dn") + '">' + (d.market_chg_pct>=0?"+":"") + (d.market_chg_pct||0).toFixed(2) + '%</span></h2>';
    h += '<p>更新: ' + (d.last_update||"--") + '</p></div>';
    
    // 买入信号
    var buys = d.hubei_pool.buy_signals || [];
    h += '<div class="card"><h2>买入信号 (' + buys.length + '个)</h2>';
    if (buys.length > 0) {
        h += '<table><tr><th>名称</th><th>涨幅</th><th>板块</th></tr>';
        for (var i=0; i<buys.length; i++) {
            var s = buys[i];
            h += '<tr><td>' + s.name + '</td><td class="' + (s.change_pct>=0?"up":"dn") + '">' + (s.change_pct>=0?"+":"") + s.change_pct.toFixed(2) + '%</td><td>' + s.sector + '</td></tr>';
        }
        h += '</table>';
    } else {
        h += '<p>无信号</p>';
    }
    h += '</div>';
    
    // 持仓
    var positions = d.positions || [];
    h += '<div class="card"><h2>持仓 (' + positions.length + '个)</h2>';
    if (positions.length > 0) {
        h += '<table><tr><th>名称</th><th>买入价</th><th>当前价</th><th>盈亏</th></tr>';
        for (var i=0; i<positions.length; i++) {
            var p = positions[i];
            h += '<tr><td>' + p.name + '</td><td>¥' + p.buy_price.toFixed(2) + '</td><td>¥' + p.current_price.toFixed(2) + '</td><td class="' + (p.current_pnl>=0?"up":"dn") + '">' + (p.current_pnl>=0?"+":"") + p.current_pnl.toFixed(2) + '</td></tr>';
        }
        h += '</table>';
    }
    h += '</div>';
    
    // 板块
    var secs = d.hubei_pool.sector_performance || [];
    h += '<div class="card"><h2>板块 (' + secs.length + '个)</h2>';
    h += '<table><tr><th>板块</th><th>涨幅</th><th>个股数</th></tr>';
    for (var i=0; i<secs.length; i++) {
        var sec = secs[i];
        h += '<tr><td>' + sec.sector + '</td><td class="' + (sec.avg_gain>=0?"up":"dn") + '">' + (sec.avg_gain>=0?"+":"") + sec.avg_gain.toFixed(2) + '%</td><td>' + sec.stock_count + '</td></tr>';
    }
    h += '</table></div>';
    
    // 全部个股行情
    var allStocks = d.hubei_pool.all_stocks || [];
    h += '<div class="card"><div class="section-title"><h2>湖北池个股 (' + allStocks.length + '/' + (d.hubei_pool.total_stocks||18) + '只)</h2></div>';
    if (allStocks.length > 0) {
        h += '<table><thead><tr><th>名称</th><th>代码</th><th>现价</th><th>涨幅</th><th>板块</th></tr></thead><tbody>';
        var sortedAll = allStocks.slice().sort(function(a,b){ return b.change_pct - a.change_pct; });
        for (var i=0; i<sortedAll.length; i++) {
            var s = sortedAll[i];
            h += '<tr class="stock-row"><td><b>' + s.name + '</b></td><td>' + s.code + '</td><td>¥' + (s.price||0).toFixed(2) + '</td><td class="' + (s.change_pct>=0?"up":"dn") + '">' + (s.change_pct>=0?"+":"") + (s.change_pct||0).toFixed(2) + '%</td><td>' + (s.sector||"-") + '</td></tr>';
        }
        h += '</tbody></table>';
    } else {
        h += '<p style="color:#8b949e;">暂无数据</p>';
    }
    h += '</div>';

    document.getElementById("app").innerHTML = h;
}
