function render(d) {
    var h = "";
    h += '<div class="card"><h2>大盘: <span class="' + (d.market_chg_pct>=0?"up":"dn") + '">' + (d.market_chg_pct>=0?"+":"") + d.market_chg_pct.toFixed(2) + '%</span></h2></div>';
    
    var secs = d.yangkai_pool.sector_performance || [];
    h += '<div class="card"><h2>板块排行 (' + secs.length + '个)</h2><table><tr><th>排名</th><th>板块</th><th>涨幅</th><th>成份股</th><th>龙头</th></tr>';
    for (var i=0; i<secs.length; i++) {
        var sec = secs[i];
        h += '<tr><td>' + (i+1) + '</td><td><b>' + sec.sector + '</b></td><td class="' + (sec.avg_gain>=0?"up":"dn") + '">' + (sec.avg_gain>=0?"+":"") + sec.avg_gain.toFixed(2) + '%</td><td>' + sec.stock_count + '只</td><td>' + (sec.top_stock||"--") + '</td></tr>';
    }
    h += '</table></div>';
    
    document.getElementById("app").innerHTML = h;
}
