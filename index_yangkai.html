<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#0a0e27;color:#e1e5f2;padding:12px;min-height:100vh;line-height:1.5}
@media(min-width:768px){body{padding:20px}}
.nav{display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.nav a{display:inline-block;padding:8px 16px;border-radius:8px;text-decoration:none;color:#8892b0;font-size:13px;border:1px solid #2d3561;background:#1a1f3a;transition:.2s}
.nav a:hover,.nav a.active{background:#2d3561;color:#00d4ff;border-color:#00d4ff}
.nav a.yk:hover,.nav a.yk.active{color:#ff9f43;border-color:#ff9f43;background:rgba(255,159,67,.08)}
.hdr{text-align:center;padding:16px 12px;background:linear-gradient(135deg,#1a1f3a,#2d3561);border-radius:12px;margin-bottom:14px;border:1px solid #3d4663}
.hdr h1{font-size:20px;color:#ff9f43;margin-bottom:4px}
@media(min-width:768px){.hdr h1{font-size:26px}}
.hdr .sub{color:#8892b0;font-size:12px}
.hdr .src{color:#64ffda;font-size:11px;margin-top:4px}
.bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:linear-gradient(135deg,#151929,#1a1f3a);border-radius:10px;margin-bottom:14px;border:1px solid #2d3561;flex-wrap:wrap;gap:8px}
.bar .item{display:flex;align-items:center;gap:6px;font-size:12px}
.bar .dot{width:9px;height:9px;border-radius:50%;animation:pulse 2s infinite}
.bar .dot.on{background:#64ffda;box-shadow:0 0 6px rgba(100,255,218,.4)}
.bar .dot.off{background:#ff6b6b;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.bar button{background:linear-gradient(135deg,#ff9f43,#e68a2e);color:#fff;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:bold}
.sum{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.sum-item{background:linear-gradient(135deg,#1a1f3a,#151929);border-radius:10px;padding:12px;text-align:center;border:1px solid #2d3561}
.sum-val{font-size:24px;font-weight:bold;font-family:'Consolas',monospace}
.sum-val.c-pos{color:#ff4d4f}.sum-val.c-neg{color:#52c41a}.sum-val.c-neu{color:#e1e5f2}.sum-val.c-yk{color:#ff9f43}
.sum-lbl{font-size:11px;color:#8892b0;margin-top:2px}
.grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:14px}
@media(min-width:900px){.grid{grid-template-columns:repeat(3,1fr)}}
.card{background:linear-gradient(135deg,#1a1f3a,#151929);border-radius:12px;padding:14px;border:1px solid #2d3561}
.card h2{font-size:13px;color:#8892b0;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #2d3561}
.metric{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1a1f3a;font-size:13px}
.metric:last-child{border-bottom:none}
.m-lbl{color:#8892b0}
.m-val{font-weight:bold;font-family:'Consolas',monospace}
.c-pos{color:#ff4d4f}.c-neg{color:#52c41a}.c-neu{color:#e1e5f2}.c-yk{color:#ff9f43}
.sig-sec{margin-top:12px}
.sig-card{background:linear-gradient(135deg,#1a1f3a,#151929);border-radius:12px;padding:14px;border:1px solid #2d3561;margin-bottom:12px}
.sig-card h2{font-size:14px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #2d3561}
.sig-card.buy h2{color:#ff4d4f}
.sig-card.sell h2{color:#52c41a}
.sig-card.warn h2{color:#ffd93d}
.sig-item{background:linear-gradient(135deg,#0f1629,#141b33);border-radius:10px;padding:12px;margin-bottom:8px;border-left:4px solid #ff9f43;transition:transform .2s}
.sig-item:hover{transform:translateX(3px)}
.sig-item.sell{border-left-color:#52c41a}
.sig-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px}
.sig-name{font-size:15px;font-weight:bold;color:#fff}
.sig-gain{padding:2px 10px;border-radius:6px;font-size:14px;font-weight:bold;font-family:'Consolas',monospace}
.g-up{background:rgba(255,77,79,.12);color:#ff4d4f}
.g-dn{background:rgba(82,196,26,.12);color:#52c41a}
.g-yk{background:rgba(255,159,67,.12);color:#ff9f43}
.sig-detail{font-size:12px;color:#8892b0;line-height:1.8}
.sig-detail b{color:#ccd6f6;font-weight:normal}
.sig-action{font-size:11px;color:#ff9f43;margin-top:6px;padding-top:6px;border-top:1px dashed #2d3561}
.sig-item.sell .sig-action{color:#52c41a}
.near-row{display:flex;justify-content:space-between;align-items:center;background:#0f1629;border-radius:8px;padding:8px 12px;margin-bottom:5px;border-left:3px solid #ffd93d}
.near-name{font-size:13px;font-weight:bold;color:#ccd6f6}
.near-gain{font-size:13px;font-weight:bold;color:#ffd93d;font-family:Consolas}
.sec-list{max-height:280px;overflow-y:auto}
.sec-item{background:#0f1629;border-radius:8px;padding:8px;margin-bottom:5px}
.sec-row{display:flex;justify-content:space-between;align-items:center}
.sec-name{font-size:12px;font-weight:bold;color:#ccd6f6}
.sec-gain{font-size:12px;font-weight:bold;font-family:Consolas}
.sec-tag{font-size:10px;padding:1px 6px;border-radius:4px;margin-left:5px}
.tag-hot{background:rgba(255,77,79,.12);color:#ff4d4f}
.tag-ok{background:rgba(136,146,176,.12);color:#8892b0}
.tag-cold{background:rgba(82,196,26,.12);color:#52c41a}
.tag-none{background:rgba(90,99,128,.12);color:#5a6380}
.empty{text-align:center;padding:18px;color:#5a6380;font-size:12px}

/* ── Tab 系统（持仓/历史/账户）── */
.tabs{display:flex;gap:0;margin-bottom:12px;border-bottom:2px solid #2d3561;flex-wrap:wrap}
.tab-btn{padding:10px 18px;background:transparent;border:none;color:#8892b0;font-size:13px;cursor:pointer;transition:.2s;border-bottom:2px solid transparent;margin-bottom:-2px;font-weight:bold}
.tab-btn:hover{color:#ff9f43}
.tab-btn.active{color:#ff9f43;border-bottom-color:#ff9f43}
.tab-panel{display:none}
.tab-panel.active{display:block}
.pos-table{width:100%;border-collapse:collapse}
.pos-table th{text-align:left;font-size:11px;color:#8892b0;padding:8px 6px;border-bottom:1px solid #2d3561;position:sticky;top:0;background:#1a1f3a}
.pos-table td{font-size:12px;padding:8px 6px;border-bottom:1px solid #1a1f3a}
.pos-table tr:hover{background:#1a1f3a}
.hist-item{background:#0f1629;border-radius:8px;padding:10px 12px;margin-bottom:6px;border-left:3px solid #ff9f43}
.hist-item.buy{border-left-color:#ff4d4f}
.hist-item.sell{border-left-color:#52c41a}
.hist-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.hist-name{font-size:13px;font-weight:bold;color:#fff}
.hist-type{font-size:11px;padding:2px 8px;border-radius:4px}
.hist-type.buy{background:rgba(255,77,79,.15);color:#ff4d4f}
.hist-type.sell{background:rgba(82,196,26,.15);color:#52c41a}
.hist-detail{font-size:11px;color:#8892b0;line-height:1.6}
.acc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.acc-item{background:#0f1629;border-radius:8px;padding:12px;text-align:center}
.acc-val{font-size:20px;font-weight:bold;font-family:'Consolas',monospace}
.acc-lbl{font-size:11px;color:#8892b0;margin-top:4px}

/* 非交易时段提示 */
.offline-bar{background:linear-gradient(135deg,#3d3000,#2a2000);border:1px solid #ff9f43;color:#ffd93d;padding:8px 14px;border-radius:8px;margin-bottom:14px;font-size:12px;text-align:center}
.offline-bar.red{background:linear-gradient(135deg,#300000,#200000);border-color:#ff4d4f;color:#ff4d4f}

.toast{position:fixed;top:16px;right:16px;background:linear-gradient(135deg,#1a1f3a,#2d3561);color:#64ffda;padding:8px 16px;border-radius:8px;border:1px solid #64ffda;font-size:12px;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#3d4663;border-radius:2px}
</style>
</head>

<div class="sig-sec">

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('pos')">💼 持仓</button>
      <button class="tab-btn" onclick="switchTab('hist')">📋 交易历史</button>
      <button class="tab-btn" onclick="switchTab('acc')">💰 账户详情</button>

    <!-- 持仓面板 -->
    <div class="tab-panel active" id="tabPos">

</div>

function fmt(v){if(v===undefined||v===null) return '¥--'; return '¥'+(parseFloat(v)||0).toLocaleString('zh-CN',{maximumFractionDigits:0});}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'):'';}

function render(d){
  if(!d) return; D = d;
  var ms = d.market_status || '';
  document.getElementById('stDot').className = ms === '交易中' ? 'dot on' : 'dot off';
  document.getElementById('stText').textContent = ms === '交易中' ? '🟢 交易中' : '⚫ ' + ms;
  document.getElementById('updTime').textContent = '✅ ' + (d.last_update || '');
  document.getElementById('srcLabel').textContent = '📡 数据源：' + (d.data_source || '未知')
    + (d.market_chg_pct !== undefined ? ' | 大盘 ' + (d.market_chg_pct >= 0 ? '+' : '') + d.market_chg_pct.toFixed(2) + '%' : '');

  // 非交易时段提示
  var offlineEl = document.getElementById('offlineBar');
  if (ms !== '交易中') {
    var upd = d.last_update || '';
    var isCrossDay = !upd.startsWith(getTodayStr());
    offlineEl.style.display = 'block';
    if (isCrossDay) {
      offlineEl.className = 'offline-bar red';
      offlineEl.innerHTML = '🔴 非交易时段，数据来自 <b>' + upd.slice(0, 16) + '</b>，非实时。下次更新：周一 09:15';
    } else {
      offlineEl.className = 'offline-bar';
      offlineEl.innerHTML = '🟡 非交易时段，数据已停止更新，展示最后可用数据（' + (upd.slice(11, 16) || '--:--') + '）';
    }
  } else {
    offlineEl.style.display = 'none';
  }

  // 账户状态栏
  var a = d.account || {};
  document.getElementById('stAsset').textContent = fmt(a.total_assets);
  var rp = a.return_pct || 0, tr = a.total_return || 0;
  var pnlEl = document.getElementById('stPnl');
  pnlEl.textContent = (tr >= 0 ? '+' : '') + '¥' + Math.abs(tr).toFixed(0);
  pnlEl.style.color = tr >= 0 ? '#ff4d4f' : '#52c41a';

  // 账户卡片
  var posVal = (a.positions || []).reduce(function(s, p) { return s + (p.market_value || p.current_price * p.buy_qty || 0); }, 0);
  document.getElementById('accBody').innerHTML =
    m('总资产', fmt(a.total_assets), 'c-yk') +
    m('可用现金', fmt(a.available_cash), 'c-neu') +
    m('持仓市值', fmt(posVal), 'c-neu') +

  // 杨凯池扫描统计
  var yk = d.yangkai_pool || {};
  var ss = d.scan_summary || {};
  document.getElementById('scanBody').innerHTML =
    m('已扫描板块', (ss.total_sectors || 24) + '/24') +

    m('⚠️ 接近阈值', (yk.near_threshold || []).length, 'c-neu');

  // 顶部统计条
  document.getElementById('sumBar').innerHTML =
    sm('🎯 买入信号', ss.yk_buy_signals || 0, 'c-yk') +
    sm('📡 已扫描板块', ss.sectors_with_signals || 0 + '/' + (ss.total_sectors || 24), 'c-neu') +
    sm('📈 强势个股', (yk.all_stocks || []).length, 'c-pos') +
    sm('⏰ 状态', ms === '交易中' ? '交易中' : '收盘', 'c-neu');

  // 买入信号
  var buys = yk.buy_signals || [];

    document.getElementById('nearList').innerHTML = nears.map(function(n) {

  }

  // 板块涨幅排行
  var secs = yk.sector_performance || [];
  if (secs.length) {
    document.getElementById('secList').innerHTML = secs.map(function(sc) {
      var ch = sc.change || 0, cc = ch > 0 ? 'c-pos' : (ch < 0 ? 'c-neg' : 'c-neu');
      var tc = sc.count > 0 && ch >= 5 ? 'tag-hot' : (sc.count > 0 && ch > 0 ? 'tag-ok' : (sc.count > 0 ? 'tag-cold' : 'tag-none'));
      return '<div class="sec-item"><div class="sec-row">' +
        '<div class="sec-name">' + esc(sc.sector) + ' <span class="sec-tag ' + tc + '">' + (sc.status || '-') + '(' + sc.count + ')</span></div>' +
        '<div class="sec-gain ' + cc + '">' + (ch >= 0 ? '+' : '') + ch.toFixed(2) + '%</div>' +
        '</div></div>';
    }).join('');
  }

  // ── Tab：持仓 ──
  renderPositions(d);

  // ── Tab：交易历史 ──
  renderHistory(d);

  // ── Tab：账户详情 ──
  renderAccDetail(d);
}

function renderPositions(d) {
  var posList = d.positions || [];
  var el = document.getElementById('posList');
  if (!posList.length) {
    el.innerHTML = '<div class="empty">暂无持仓 · 等待买入信号触发 🔶</div>';
    return;
  }
  el.innerHTML = '<table class="pos-table"><thead><tr><th>股票</th><th>数量</th><th>成本</th><th>现价</th><th>盈亏%</th><th>止损线</th><th>止盈线</th></tr></thead><tbody>' +
    posList.map(function(p) {
      var pnlPct = p.current_pnl_pct || 0;
      var pnlCls = pnlPct >= 0 ? 'c-pos' : 'c-neg';
      return '<tr>' +
        '<td style="font-weight:bold;color:#ff9f43">' + esc(p.name) + '(' + esc(p.code) + ')</td>' +
        '<td>' + p.buy_qty + '</td>' +
        '<td>' + (p.buy_price || 0).toFixed(2) + '</td>' +
        '<td>' + (p.current_price || 0).toFixed(2) + '</td>' +
        '<td class="' + pnlCls + '" style="font-weight:bold">' + (pnlPct >= 0 ? '+' : '') + pnlPct.toFixed(2) + '%</td>' +
        '<td style="color:#ff4d4f">' + (p.stop_loss_price || 0).toFixed(2) + '</td>' +
        '<td style="color:#52c41a">' + (p.take_profit_price || 0).toFixed(2) + '</td>' +
      '</tr>';
    }).join('') + '</tbody></table>';
}

function renderHistory(d) {
  var hist = d.trade_history || [];
  var el = document.getElementById('histList');
  if (!hist.length) {
    el.innerHTML = '<div class="empty">暂无交易记录 · 自动买卖开启后会在此显示</div>';
    return;
  }
  el.innerHTML = hist.reverse().map(function(h) {
    var isBuy = h.action === '买入';
    return '<div class="hist-item ' + (isBuy ? 'buy' : 'sell') + '">' +
      '<div class="hist-hd">' +
        '<span class="hist-name">' + (isBuy ? '🔶' : '🔴') + ' ' + esc(h.stock_name) + '(' + esc(h.code) + ')</span>' +
        '<span class="hist-type ' + (isBuy ? 'buy' : 'sell') + '">' + h.action + '</span>' +
      '</div>' +
      '<div class="hist-detail">' +
        (isBuy ?
          '💰 价格：<b>' + (h.price || 0).toFixed(2) + '</b> | 📊 数量：<b>' + (h.qty || 0) + '</b>股 | 💵 金额：<b>¥' + ((h.amount || 0).toFixed(0)) + '</b>'
          :
          '💰 价格：<b>' + (h.price || 0).toFixed(2) + '</b> | 📊 盈亏：<b class="' + (h.pnl >= 0 ? 'c-pos' : 'c-neg') + '">' + (h.pnl >= 0 ? '+' : '') + (h.pnl || 0).toFixed(2) + '</b> | 📝 原因：' + esc(h.reason || '-')
        ) +
        '<br>⏰ ' + (h.time || '--') +
      '</div>' +
    '</div>';
  }).join('');
}

function renderAccDetail(d) {
  var a = d.account || {};
  var ts = d.trade_stats || {};
  var el = document.getElementById('accDetail');
  var wr = ts.win_rate || 0;
  el.innerHTML =
    '<div class="acc-grid">' +
      '<div class="acc-item"><div class="acc-val c-yk">' + fmt(a.total_assets) + '</div><div class="acc-lbl">总资产</div></div>' +
      '<div class="acc-item"><div class="acc-val c-neu">' + fmt(a.available_cash) + '</div><div class="acc-lbl">可用现金</div></div>' +
      '<div class="acc-item"><div class="acc-val c-neu">' + fmt(a.yk_cash) + '</div><div class="acc-lbl">杨凯池资金</div></div>' +
      '<div class="acc-item"><div class="acc-val c-neu">' + fmt(a.hb_cash) + '</div><div class="acc-lbl">湖北池资金</div></div>' +
      '<div class="acc-item"><div class="acc-val ' + (a.return_pct >= 0 ? 'c-pos' : 'c-neg') + '">' + (a.return_pct >= 0 ? '+' : '') + (a.return_pct || 0).toFixed(2) + '%</div><div class="acc-lbl">收益率</div></div>' +
      '<div class="acc-item"><div class="acc-val ' + (a.total_return >= 0 ? 'c-pos' : 'c-neg') + '">' + (a.total_return >= 0 ? '+' : '') + fmt(Math.abs(a.total_return)) + '</div><div class="acc-lbl">总盈亏</div></div>' +
      '<div class="acc-item"><div class="acc-val c-neu">' + fmt(a.initial_cash) + '</div><div class="acc-lbl">初始资金</div></div>' +
      '<div class="acc-item"><div class="acc-val c-yk">' + (ts.total_trades || 0) + '</div><div class="acc-lbl">总交易次数</div></div>' +
      '<div class="acc-item"><div class="acc-val ' + (wr >= 50 ? 'c-pos' : 'c-neg') + '">' + wr.toFixed(1) + '%</div><div class="acc-lbl">胜率</div></div>' +
      '<div class="acc-item"><div class="acc-val ' + ((ts.total_pnl || 0) >= 0 ? 'c-pos' : 'c-neg') + '">' + ((ts.total_pnl || 0) >= 0 ? '+' : '') + (ts.total_pnl || 0).toFixed(0) + '</div><div class="acc-lbl">累计盈亏(元)</div></div>' +
    '</div>';
}

// ── Tab切换 ──
function switchTab(tabName) {
  // 更新按钮状态
  var btns = document.querySelectorAll('.tab-btn');
  btns.forEach(function(b) { b.classList.remove('active'); });
  event.target.classList.add('active');

  // 切换面板
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
  if (tabName === 'pos') document.getElementById('tabPos').classList.add('active');
  else if (tabName === 'hist') document.getElementById('tabHist').classList.add('active');
  else if (tabName === 'acc') document.getElementById('tabAcc').classList.add('active');
}

function getTodayStr() {
  var now = new Date();
  return now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
}

function m(lbl, val, cls) {
  return '<div class="metric"><span class="m-lbl">' + lbl + '</span><span class="m-val ' + (cls || 'c-neu') + '">' + val + '</span></div>';
}
function sm(lbl, val, cls) {
  return '<div class="sum-item"><div class="sum-val ' + (cls || 'c-neu') + '">' + val + '</div><div class="sum-lbl">' + lbl + '</div></div>';
}

function doRefresh() {
  showToast('正在刷新...');
  fetch('https://lawrda.github.io/stock-watchboard/dashboard_yangkai.json?t=' + Date.now(), { cache: 'no-cache' })
    .then(function(r) { if (!r.ok) throw 0; return r.json(); })
    .then(function(d) { D = d; render(d); showToast('✅ 数据已更新！'); })
    .catch(function() {
      fetch('dashboard_yangkai.json?t=' + Date.now(), { cache: 'no-cache' })
        .then(function(r) { if (!r.ok) throw 0; return r.json(); })
        .then(function(d) { D = d; render(d); showToast('✅ 本地数据已更新！'); })
        .catch(function() { showToast('❌ 无法获取最新数据'); });
    });
}
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

render(D);
doRefresh();
setInterval(doRefresh, 30000);
</script>
</body>
</html>
