try {
    function decodeB64Utf8(b64) {
        var bin = atob(b64);
        var bytes = new Uint8Array(bin.length);
        for (var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
        return new TextDecoder("utf-8").decode(bytes);
    }
    DATA = JSON.parse(decodeB64Utf8(DATA_B64));
    console.log("杨凯池数据加载成功", DATA.last_update);
    render(DATA);
} catch(e) {
    document.getElementById("app").innerHTML = "<div class='card'>数据解析错误: " + e + "</div>";

function render(d) {
    var h = "";
    
    // === 账户概览 ===
    h += '<div class="card"><div class="section-title"><h2>账户概览</h2></div>';
    h += '<div class="summary-row">';
    h += '<div class="metric"><span class="label">总资产</span><div class="value">¥' + (d.account.total_assets||0).toFixed(0) + '</div></div>';
    h += '<div class="metric"><span class="label">可用资金</span><div class="value">¥' + (d.account.available_cash||0).toFixed(0) + '</div></div>';
    h += '<div class="metric"><span class="label">收益</span><div class="value ' + ((d.account.return_pct||0)>=0?"up":"dn") + '">' + ((d.account.return_pct||0)>=0?"+":"") + (d.account.return_pct||0).toFixed(2) + '%</div></div>';
    h += '</div></div>';
    
    // === 大盘 ===
    h += '<div class="card"><h2>大盘: <span class="' + (d.market_chg_pct>=0?"up":"dn") + '">' + (d.market_chg_pct>=0?"+":"") + d.market_chg_pct.toFixed(2) + '%</span> <span style="color:#8b949e;font-size:12px;">| 更新: ' + (d.last_update||"--") + '</span> <span class="' + (d.data_source.indexOf("TDX")>=0?"tag tag-green":"tag") + '">' + d.data_source + '</span></h2></div>';
    
    // === 扫描摘要 ===
    var summary = d.scan_summary || {};
    h += '<div class="card"><div class="section-title"><h2>扫描摘要</h2></div>';
    h += '<table><tr><td>扫描板块</td><td>' + (summary.total_sectors||0) + '个</td></tr>';
    h += '<tr><td>V2买入信号</td><td><span class="badge">' + (summary.yk_buy_signals||0) + '个</span></td></tr>';
    h += '<tr><td>有强势股板块</td><td>' + (summary.sectors_with_signals||0) + '个</td></tr>';
    h += '<tr><td>涨幅>5.5%个股</td><td><span class="up">' + (summary.strong_stocks_total||0) + '只</span></td></tr></table></div>';
    
    // === V2买入信号（仅板块均涨>0的） ===
    var buys = d.yangkai_pool.buy_signals || [];
    h += '<div class="card"><div class="section-title"><h2>V2买入信号 (' + buys.length + '个)</h2><span class="badge">' + buys.length + '</span></div>';
    if (buys.length > 0) {
        h += '<p style="color:#8b949e;font-size:12px;margin-bottom:8px;">板块均涨&gt;0% + 个股涨幅&gt;5.5%</p>';
        h += '<table><thead><tr><th>名称</th><th>代码</th><th>现价</th><th>涨幅</th><th>板块</th><th>板块均涨</th></tr></thead><tbody>';
        // 按涨幅排序
        var sortedBuys = buys.slice().sort(function(a,b){ return b.change_pct - a.change_pct; });
        for (var i=0; i<sortedBuys.length && i<30; i++) {
            var s = sortedBuys[i];
            h += '<tr class="stock-row"><td><b>' + s.name + '</b></td><td>' + s.code + '</td><td>¥' + s.price.toFixed(2) + '</td><td class="up">+' + s.change_pct.toFixed(2) + '%</td><td>' + s.sector + '</td><td class="' + (s.sector_change>=0?"up":"dn") + '">' + (s.sector_change>=0?"+":"") + s.sector_change.toFixed(2) + '%</td></tr>';
        }
        if (sortedBuys.length > 30) h += '<tr><td colspan="6" style="text-align:center;color:#8b949e;">... 还有 ' + (sortedBuys.length-30) + ' 只</td></tr>';
        h += '</tbody></table>';
    } else {
        h += '<p style="color:#8b949e;">今日无符合条件的V2买入信号（需板块均涨>0%且个股>5.5%）</p>';
    }
    h += '</div>';
    
    // === 强势个股明细（所有>5.5%的，不限板块条件）===
    var allStocks = d.yangkai_pool.all_stocks || [];
    if (allStocks.length > 0) {
        h += '<div class="card"><div class="section-title"><h2>强势个股明细 (涨幅>5.5%)</h2><span class="tag tag-red">' + allStocks.length + '只</span></div>';
        
        // 按板块分组
        var bySector = {};
        for (var j=0; j<allStocks.length; j++) {
            var st = allStocks[j];
            if (!bySector[st.sector]) bySector[st.sector] = [];
            bySector[st.sector].push(st);
        }
        var sectorNames = Object.keys(bySector).sort(function(a,b){
            var aMax = Math.max.apply(null, bySector[a].map(function(x){return x.change_pct;}));
            var bMax = Math.max.apply(null, bySector[b].map(function(x){return x.change_pct;}));
            return bMax - aMax;
        });
        
        for (var si=0; si<sectorNames.length; si++) {
            var secName = sectorNames[si];
            var secStocks = bySector[secName].sort(function(a,b){ return b.change_pct - a.change_pct; });
            // 板块标题行
            var secInfo = null;
            var secs = d.yangkai_pool.sector_performance || [];
            for (var k=0;k<secs.length;k++){ if(secs[k].sector===secName){secInfo=secs[k];break;} }
            h += '<h3 style="margin:12px 0 6px;color:#f0883e;font-size:14px;">' + secName;
            if(secInfo){ h += ' <span style="font-size:12px;' + (secInfo.avg_gain>=0?'color:#ff4d4f':'color:#52c41a') + '">(' + (secInfo.avg_gain>=0?'+':'') + secInfo.avg_gain.toFixed(2) + '%)</span>'; }
            h += '</h3>';
            h += '<table><thead><tr><th>#</th><th>名称</th><th>代码</th><th>现价</th><th>涨幅</th></tr></thead><tbody>';
            var showCount = Math.min(secStocks.length, 10);
            for (var sj=0; sj<showCount; sj++) {
                var ss = secStocks[sj];
                h += '<tr class="stock-row"><td>'+(sj+1)+'</td><td><b>'+ss.name+'</b></td><td>'+ss.code+'</td><td>¥'+ss.price.toFixed(2)+'</td><td class="up">+'+ss.change_pct.toFixed(2)+'%</td></tr>';
            }
            if (secStocks.length > 10) h += '<tr><td colspan="5" style="text-align:center;color:#8b949e;">... 还有 '+(secStocks.length-10)+' 只</td></tr>';
            h += '</tbody></table>';
        }
        h += '</div>';
    }
    
    // === 板块排行 ===
    var secs = d.yangkai_pool.sector_performance || [];
    h += '<div class="card"><div class="section-title"><h2>板块排行 (' + secs.length + '个)</h2></div>';
    h += '<table><thead><tr><th>排名</th><th>板块</th><th>均涨</th><th>成份股</th><th>上涨/下跌</th><th>龙头</th><th>>5.5%信号</th></tr></thead><tbody>';
    for (var i=0; i<secs.length; i++) {
        var sc = secs[i];
        h += '<tr class="stock-row"><td>'+(i+1)+'</td><td><b>'+sc.sector+'</b></td>';
        h += '<td class="'+(sc.avg_gain>=0?"up":"dn")+'">'+(sc.avg_gain>=0?"+":"")+sc.avg_gain.toFixed(2)+'%</td>';
        h += '<td>'+sc.stock_count+'只</td>';
        h += '<td><span class="up">'+(sc.rise_count||0)+'</span>/<span class="dn">'+(sc.fall_count||0)+'</span></td>';
        h += '<td>'+(sc.top_stock||"-")+'</td>';
        h += '<td>'+(sc.signal_count>0?'<span class="tag tag-red">'+sc.signal_count+'只</span>':'<span style="color:#8b949e;">-</span>')+'</td></tr>';
    }
    h += '</tbody></table></div>';
    
    document.getElementById("app").innerHTML = h;
}
