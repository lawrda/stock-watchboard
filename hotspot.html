<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每天热点盯盘系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 2px solid #21262d;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .header h1 {
            font-size: 28px;
            color: #f0883e;
            font-weight: bold;
        }
        
        .header .subtitle {
            color: #8b949e;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .status-badge {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .status-badge.trading {
            background: #238636;
            color: white;
        }
        
        .status-badge.closed {
            background: #21262d;
            color: #8b949e;
        }
        
        .refresh-btn {
            background: #238636;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        
        .refresh-btn:hover {
            background: #2ea043;
        }
        
        .update-time {
            color: #8b949e;
            font-size: 13px;
        }
        
        .time-slot {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .time-slot-label {
            color: #8b949e;
            font-size: 14px;
        }
        
        .time-slot-value {
            color: #f0883e;
            font-size: 24px;
            font-weight: bold;
        }
        
        .data-source {
            color: #8b949e;
            font-size: 12px;
            margin-left: auto;
        }
        
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 1200px) {
            .two-col { grid-template-columns: 1fr; }
        }
        
        .section {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 20px;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #f0883e;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title .count {
            background: #21262d;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 14px;
            color: #8b949e;
        }
        
        /* 板块表格 */
        .sector-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .sector-table th {
            background: #21262d;
            padding: 10px;
            text-align: left;
            font-size: 13px;
            color: #8b949e;
            border-bottom: 1px solid #30363d;
        }
        
        .sector-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #21262d;
            font-size: 14px;
        }
        
        .sector-table tr:hover {
            background: #1c2128;
        }
        
        .sector-name {
            font-weight: bold;
            color: #e6edf3;
        }
        
        .pnl-positive { color: #f85149; }
        .pnl-negative { color: #3fb950; }
        
        .leader-stock {
            font-size: 12px;
            color: #8b949e;
            margin-top: 3px;
        }
        
        /* 个股表格 */
        .stock-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .stock-table th {
            background: #21262d;
            padding: 10px;
            text-align: left;
            font-size: 13px;
            color: #8b949e;
            border-bottom: 1px solid #30363d;
        }
        
        .stock-table td {
            padding: 10px;
            border-bottom: 1px solid #21262d;
            font-size: 14px;
        }
        
        .stock-table tr:hover {
            background: #1c2128;
        }
        
        .stock-name {
            font-weight: bold;
        }
        
        .stock-code {
            color: #8b949e;
            font-size: 12px;
        }
        
        /* 板块详情 */
        .sector-detail {
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
        }
        
        .sector-detail-title {
            font-size: 16px;
            font-weight: bold;
            color: #f0883e;
            margin-bottom: 10px;
        }
        
        .stock-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }
        
        .stock-card {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 6px;
            padding: 10px;
            font-size: 13px;
        }
        
        .stock-card .name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #8b949e;
            font-size: 16px;
        }
        
        .error {
            background: #161b22;
            border: 1px solid #f85149;
            border-radius: 8px;
            padding: 30px;
            color: #f85149;
            text-align: center;
        }
        
        .auto-refresh {
            text-align: center;
            color: #8b949e;
            font-size: 12px;
            margin-top: 30px;
            padding-bottom: 30px;
        }
        
        /* 排名徽章 */
        .rank-badge {
            display: inline-block;
            width: 24px;
            height: 24px;
            line-height: 24px;
            text-align: center;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 8px;
        }
        
        .rank-1 { background: #f0883e; color: #0d1117; }
        .rank-2 { background: #8b949e; color: #0d1117; }
        .rank-3 { background: #a16207; color: #0d1117; }
        .rank-other { background: #21262d; color: #8b949e; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🔥 每天热点盯盘系统</h1>
                <div class="subtitle">6个时间段自动抓取 | 数据源：东方财富 | 免费使用</div>
            </div>
            <div class="status">
                <span class="status-badge" id="statusBadge">加载中...</span>
                <span class="update-time" id="updateTime"></span>
                <button class="refresh-btn" onclick="loadData()">🔄 立即刷新</button>
            </div>
        </div>
        
        <div id="content">
            <div class="loading">正在加载数据...</div>
        </div>
        
        <div class="auto-refresh">
            自动刷新间隔：5分钟 | 数据更新时间：<span id="lastUpdate">--</span>
        </div>
    </div>
    
    <script>
        const DATA_URL = 'hotspot_data.json';
        const REFRESH_INTERVAL = 5 * 60 * 1000; // 5分钟
        
        let refreshTimer = null;
        
        function isTradingTime() {
            const now = new Date();
            const day = now.getDay();
            if (day === 0 || day === 6) return false;
            
            const hour = now.getHours();
            const minute = now.getMinutes();
            const time = hour * 100 + minute;
            
            return (time >= 930 && time <= 1130) || (time >= 1300 && time <= 1500);
        }
        
        function formatPct(val) {
            if (val === null || val === undefined) return '--';
            const v = parseFloat(val);
            const sign = v >= 0 ? '+' : '';
            return `${sign}${v.toFixed(2)}%`;
        }
        
        function formatMoney(val) {
            if (val === null || val === undefined) return '--';
            return parseFloat(val).toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        }
        
        function formatVolume(val) {
            if (!val) return '--';
            if (val >= 100000000) return (val / 100000000).toFixed(2) + '亿';
            if (val >= 10000) return (val / 10000).toFixed(2) + '万';
            return val.toString();
        }
        
        async function loadData() {
            try {
                const response = await fetch(`${DATA_URL}?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error('数据加载失败');
                
                const data = await response.json();
                renderData(data);
                updateStatus(data);
                
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <h3>⚠️ 数据加载失败</h3>
                        <p>请检查网络连接或稍后重试</p>
                    </div>
                `;
            }
        }
        
        function updateStatus(data) {
            const badge = document.getElementById('statusBadge');
            const time = document.getElementById('updateTime');
            const lastUpdate = document.getElementById('lastUpdate');
            
            const trading = isTradingTime();
            badge.className = `status-badge ${trading ? 'trading' : 'closed'}`;
            badge.textContent = trading ? '🟢 交易中' : '🔴 已收盘';
            
            if (data.update_time) {
                time.textContent = data.update_time;
                lastUpdate.textContent = data.update_time;
            }
        }
        
        function renderData(data) {
            if (!data) return;
            
            let html = '';
            
            // 时间段显示
            html += `
                <div class="time-slot">
                    <div>
                        <div class="time-slot-label">当前时间段</div>
                        <div class="time-slot-value">${data.time_slot || '--:--'}</div>
                    </div>
                    <div class="data-source">数据来源：${data.data_source || '未知'} | 日期：${data.date || '--'}</div>
                </div>
            `;
            
            // 双栏：热门板块 + 热门个股
            html += '<div class="two-col">';
            
            // 左栏：热门板块
            html += '<div class="section">';
            html += '<div class="section-title">📊 热门板块 <span class="count">' + (data.hot_sectors || []).length + '个</span></div>';
            
            if (data.hot_sectors && data.hot_sectors.length > 0) {
                html += '<table class="sector-table">';
                html += '<tr><th>排名</th><th>板块名称</th><th>涨幅</th><th>领涨股</th></tr>';
                
                data.hot_sectors.slice(0, 20).forEach((sector, idx) => {
                    const rankClass = idx < 3 ? `rank-${idx + 1}` : 'rank-other';
                    const pnlClass = sector.change_pct >= 0 ? 'pnl-positive' : 'pnl-negative';
                    
                    html += `<tr onclick="toggleSectorDetail('${sector.name}')" style="cursor: pointer;">`;
                    html += `<td><span class="rank-badge ${rankClass}">${idx + 1}</span></td>`;
                    html += `<td><div class="sector-name">${sector.name}</div></td>`;
                    html += `<td><span class="${pnlClass}" style="font-weight: bold; font-size: 16px;">${formatPct(sector.change_pct)}</span></td>`;
                    html += `<td><div class="leader-stock">${sector.leader_stock || '--'}</div></td>`;
                    html += '</tr>';
                    
                    // 板块详情（隐藏）
                    if (data.sector_stocks && data.sector_stocks[sector.name]) {
                        html += `<tr id="detail-${sector.name}" style="display: none;"><td colspan="4">`;
                        html += `<div class="sector-detail">`;
                        html += `<div class="sector-detail-title">${sector.name} - 领涨股</div>`;
                        html += '<div class="stock-list">';
                        
                        data.sector_stocks[sector.name].slice(0, 10).forEach(stock => {
                            const sClass = stock.change_pct >= 0 ? 'pnl-positive' : 'pnl-negative';
                            html += `
                                <div class="stock-card">
                                    <div class="name">${stock.name} <span style="color: #8b949e;">${stock.code}</span></div>
                                    <div style="margin-top: 5px; display: flex; justify-content: space-between;">
                                        <span>¥${(stock.price || 0).toFixed(2)}</span>
                                        <span class="${sClass}" style="font-weight: bold;">${formatPct(stock.change_pct)}</span>
                                    </div>
                                </div>
                            `;
                        });
                        
                        html += '</div></div></td></tr>';
                    }
                });
                
                html += '</table>';
            } else {
                html += '<div style="color: #8b949e; padding: 20px; text-align: center;">暂无板块数据</div>';
            }
            
            html += '</div>'; // 结束左栏
            
            // 右栏：热门个股
            html += '<div class="section">';
            html += '<div class="section-title">🔥 热门个股 <span class="count">' + (data.hot_stocks || []).length + '只</span></div>';
            
            if (data.hot_stocks && data.hot_stocks.length > 0) {
                html += '<table class="stock-table">';
                html += '<tr><th>排名</th><th>股票</th><th>涨幅</th><th>价格</th><th>成交额</th></tr>';
                
                data.hot_stocks.slice(0, 30).forEach((stock, idx) => {
                    const rankClass = idx < 3 ? `rank-${idx + 1}` : 'rank-other';
                    const pnlClass = stock.change_pct >= 0 ? 'pnl-positive' : 'pnl-negative';
                    
                    html += '<tr>';
                    html += `<td><span class="rank-badge ${rankClass}">${idx + 1}</span></td>`;
                    html += `<td><div class="stock-name">${stock.name}</div><div class="stock-code">${stock.code}</div></td>`;
                    html += `<td><span class="${pnlClass}" style="font-weight: bold; font-size: 16px;">${formatPct(stock.change_pct)}</span></td>`;
                    html += `<td>¥${(stock.price || 0).toFixed(2)}</td>`;
                    html += `<td>${formatVolume(stock.amount)}</td>`;
                    html += '</tr>';
                });
                
                html += '</table>';
            } else {
                html += '<div style="color: #8b949e; padding: 20px; text-align: center;">暂无个股数据</div>';
            }
            
            html += '</div>'; // 结束右栏
            html += '</div>'; // 结束双栏
            
            document.getElementById('content').innerHTML = html;
        }
        
        function toggleSectorDetail(sectorName) {
            const detail = document.getElementById(`detail-${sectorName}`);
            if (detail) {
                detail.style.display = detail.style.display === 'none' ? 'table-row' : 'none';
            }
        }
        
        function init() {
            loadData();
            refreshTimer = setInterval(loadData, REFRESH_INTERVAL);
            console.log('热点盯盘系统已启动 | 刷新间隔:', REFRESH_INTERVAL / 1000, '秒');
        }
        
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
