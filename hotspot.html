<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每天热点盯盘系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
            background: #0d1117;
            color: #e6edf3;
            padding: 15px;
            line-height: 1.6;
        }
        .container { max-width: 1400px; margin: 0 auto; }

        /* 头部 */
        .header { display:flex; justify-content:space-between; align-items:center; padding:16px 0; border-bottom:2px solid #21262d; margin-bottom:18px; flex-wrap:wrap; gap:10px; }
        .header h1 { font-size:26px; color:#f0883e; }
        .header .sub { color:#8b949e; font-size:13px; margin-top:4px; }
        .status { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
        .badge { padding:7px 14px; border-radius:6px; font-size:13px; font-weight:bold; }
        .badge.trading { background:#238636; color:#fff; }
        .badge.closed { background:#21262d; color:#8b949e; }
        .refresh-btn { background:#238636; color:#fff; border:none; padding:9px 18px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:13px; }
        .refresh-btn:hover { background:#2ea043; }
        .time-info { color:#8b949e; font-size:12px; }
        .slot-bar { background:#161b22; border:1px solid #21262d; border-radius:8px; padding:12px 18px; margin-bottom:18px; display:flex; align-items:center; gap:14px; }
        .slot-label { color:#8b949e; font-size:13px; }
        .slot-value { color:#f0883e; font-size:22px; font-weight:bold; }
        .src-tag { color:#8b949e; font-size:11px; margin-left:auto; }

        /* 区块 */
        .section { background:#161b22; border:1px solid #21262d; border-radius:10px; padding:18px; margin-bottom:18px; }
        .sec-title { font-size:17px; font-weight:bold; margin-bottom:14px; color:#f0883e; display:flex; align-items:center; gap:8px; }
        .sec-title .cnt { background:#21262d; padding:2px 10px; border-radius:4px; font-size:13px; color:#8b949e; }
        .two-col { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:18px; }
        @media(max-width:1100px){.two-col{grid-template-columns:1fr;}}

        /* 表格 */
        table { width:100%; border-collapse:collapse; }
        th { background:#21262d; padding:9px 10px; text-align:left; font-size:12px; color:#8b949e; border-bottom:1px solid #30363d; }
        td { padding:10px 8px; border-bottom:1px solid #21262d; font-size:13px; }
        tr:hover{background:#1c2128}
        .rank { display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;border-radius:4px;font-size:11px;font-weight:bold;margin-right:6px; }
        .r1{background:#f0883e;color:#0d1117}.r2{background:#8b949e;color:#0d1117}.r3{background:#a16207;color:#0d1117}.ro{background:#21262d;color:#8b949e}
        .p-up{color:#f85149;font-weight:bold}.p-down{color:#3fb950}

        /* 分析卡片 */
        .ana-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:18px; }
        @media(max-width:800px){.ana-grid{grid-template-columns:1fr}}
        .ana-card { background:#161b22; border:1px solid #21262d; border-radius:10px; padding:14px; }
        .ana-head { font-size:13px; font-weight:bold; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
        .ana-sustained .ana-head{color:#3fb950}
        .ana-capital .ana-head{color:#58a6ff}
        .ana-new .ana-head{color:#f0883e}
        .ana-item { background:#0d1117; border-radius:6px; padding:10px 12px; margin-bottom:6px; font-size:13px; }
        .ana-name { font-weight:bold; }
        .ana-reason { color:#8b949e; font-size:11px; margin-top:3px; }

        /* 风险提示 */
        .risk-item { background:#1c1215; border:1px solid #f8514940; border-radius:6px; padding:10px 14px; margin-bottom:8px; font-size:13px; display:flex; justify-content:space-between; align-items:center; }
        .risk-high{border-color:#f85149;background:#1c1215}
        .risk-med{border-color:#a16207;background:#1c1812}
        .risk-level { font-size:11px; padding:2px 8px; border-radius:4px; font-weight:bold; }
        .rl-high{background:#f85149;color:white}
        .rl-med{background:#a16207;color:white}

        /* 预测 */
        .pred-box { background:#0d1117; border-radius:8px; padding:14px; margin-bottom:10px; }
        .pred-title { font-weight:bold; font-size:14px; color:#f0883e; margin-bottom:8px; }
        .pred-stock { display:inline-block; background:#161b22; border:1px solid #30363d; border-radius:6px; padding:8px 14px; margin:4px 6px 4px 0; font-size:13px; }
        .pred-conf { font-size:11px; color:#8b949e; margin-top:2px; }

        .loading{text-align:center;padding:60px;color:#8b949e;font-size:16px}
        .error{background:#161b22;border:1px solid #f85149;border-radius:8px;padding:30px;color:#f85149;text-align:center}
        .footer{text-align:center;color:#8b949e;font-size:12px;margin-top:20px;padding-bottom:30px}

        /* 板块展开 */
        .expandable{cursor:pointer}
        .detail-row td{padding:8px 14px!important}
        .stock-list-sm{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px}
        .stk-mini{background:#161b22;border:1px solid #21262d;border-radius:5px;padding:6px 10px;font-size:12px}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div><h1>🔥 每天热点盯盘系统</h1><div class="sub">6个时间段自动抓取 · 智能分析 · 免费使用</div></div>
        <div class="status"><span class="badge" id="statusBadge">加载中...</span><span class="time-info" id="updateTime"></span><button class="refresh-btn" onclick="loadData()">🔄 刷新</button></div>
    </div>

    <div id="content"><div class="loading">正在加载数据...</div></div>

    <div class="footer">自动刷新间隔：5分钟 | 数据更新：<span id="lastUpdate">--</span></div>
</div>

<script>
const DATA_URL='hotspot_data.json';
const REFRESH=5*60*1000;

function isTrading(){const d=new Date();if(d.getDay()>=5)return false;const h=d.getHours(),m=d.getMinutes(),t=h*100+m;return(t>=930&&t<=1130)||(t>=1300&&t<=1500)}
function fp(v){if(v==null||v==='')return'--';return(parseFloat(v)>=0?'+':'')+parseFloat(v).toFixed(2)+'%'}
function fm(v){if(!v)return'--';const f=parseFloat(v);return(f>=1e8?(f/1e8).toFixed(2)+'亿':(f>=1e4?(f/1e4).toFixed(2)+'万':String(f))}
function safeF(v){try{return parseFloat(v)||0}catch(e){return 0}}

async function loadData(){
    try{
        const r=await fetch(`${DATA_URL}?t=${Date.now()}`);
        if(!r.ok)throw new Error('HTTP '+r.status);
        const data=await r.json();
        render(data);
        updStatus(data);
    }catch(e){
        document.getElementById('content').innerHTML=`<div class="error"><h3>⚠️ 加载失败</h3><p>${e.message}</p></div>`;
    }
}

function updStatus(d){
    const b=document.getElementById('statusBadge');
    b.className='badge '+(isTrading()?'trading':'closed');
    b.textContent=isTrading()?'🟢 交易中':'🔴 已收盘';
    if(d.update_time){
        document.getElementById('updateTime').textContent=d.update_time;
        document.getElementById('lastUpdate').textContent=d.update_time;
    }
}

function render(d){
    let h='';
    // 时间段条
    h+=`<div class="slot-bar"><div><div class="slot-label">当前时间段</div><div class="slot-value">${d.time_slot||'--:--'}</div></div><div class="src-tag">数据源:${d.data_source||'未知'} | 日期:${d.date||'--'}</div></div>`;
    
    // 分析三级
    const a=d.analysis||{};
    h+='<div class="ana-grid">';
    // 持续热点
    h+=`<div class="ana-card ana-sustained"><div class="ana-head">🟢 持续热点板块 (${(a.sustained_hot||[]).length})</div>`;
    (a.sustained_hot||[]).forEach(s=>{h+=`<div class="ana-item"><div class="ana-name">${s.name} <span class="${safeF(s.change_pct)>=0?'p-up':'p-down'}">${fp(s.change_pct)}</span></div>`+(s.appear_count?`<div class="ana-reason">出现${s.appear_count}次 | 成交额 ${fm(s.amount)}</div>`:'')+'</div>'});
    if(!(a.sustained_hot||[]).length)h+='<div style="color:#8b949e;padding:10px;text-align:center;font-size:13px">首次抓取或无持续热点</div>';
    h+='</div>';

    // 资金流入板块
    h+=`<div class="ana-card ana-capital"><div class="ana-head">💰 资金流入最多板块 (${(a.capital_inflow_sectors||[]).length})</div>`;
    (a.capital_inflow_sectors||[]).forEach(s=>{h+=`<div class="ana-item"><div class="ana-name">${s.name} <span class="${safeF(s.change_pct)>=0?'p-up':'p-down'}">${fp(s.change_pct)}</span></div><div class="ana-reason">成交额 ${fm(s.amount)} | 资金流入 ${fm(s.capital_inflow)}</div></div>`});
    if(!(a.capital_inflow_sectors||[]).length)h+='<div style="color:#8b949e;padding:10px;text-align:center;font-size:13px">暂无数据</div>';
    h+='</div>';

    // 最新热点
    h+=`<div class="ana-card ana-new"><div class="ana-head">🆕 最新热点板块 (${(a.new_hot||[]).length})</div>`;
    (a.new_hot||[]).forEach(s=>{h+=`<div class="ana-item"><div class="ana-name">${s.name} <span class="${safeF(s.change_pct)>=0?'p-up':'p-down'}">${fp(s.change_pct)}</span></div><div class="ana-reason">领涨股:${s.leader_stock||'-'}(${fp(s.leader_change)}) | 成交额 ${fm(s.amount)}</div></div>`});
    if(!(a.new_hot||[]).length)h+='<div style="color:#8b949e;padding:10px;text-align:center;font-size:13px">暂无数据</div>';
    h+='</div>';
    h+='</div>';

    // 双栏：热门板块 + 热门个股
    h+='<div class="two-col">';
    // 热门板块（前6）
    h+=`<div class="section"><div class="sec-title">📊 热门板块 <span class="cnt">${(d.hot_sectors||[]).length}/6</span></div>`;
    if((d.hot_sectors||[]).length){
        h+='<table><tr><th>#</th><th>板块</th><th>涨幅</th><th>成交额</th><th>领涨股</th></tr>';
        d.hot_sectors.forEach((s,i)=>{
            const rc=i<3?('r'+(i+1)):'ro';
            h+=`<tr class="expandable" onclick="toggleSec('${s.code}')"><td><span class="rank ${rc}">${i+1}</span></td>`;
            h+=`<td><div class="ana-name" style="font-size:14px">${s.name}</div></td>`;
            h+=`<td><span class="${safeF(s.change_pct)>=0?'p-up':'p-down'}" style="font-size:15px">${fp(s.change_pct)}</span></td>`;
            h+=`<td>${fm(s.amount)}</td><td>${s.leader_stock||'-'} <span style="color:#8b949e;font-size:11px">${fp(s.leader_change)}</span></td></tr>`;
            // 板块内个股
            const ss=(d.sector_stocks||{})[s.name];
            if(ss&&ss.length){h+=`<tr id="ds-${s.code}" style="display:none" class="detail-row"><td colspan="5"><div class="pred-box" style="margin:0"><strong>${s.name} 领涨股：</strong><div class="stock-list-sm">`;ss.slice(0,5).forEach(st=>{h+=`<div class="stk-mini">${st.name}<span style="color:#8b949e;font-size:10px">(${st.code})</span> ${fp(st.change_pct)} ${fm(st.capital_inflow)}</div>`});h+='</div></div></td></tr>';}
        });
        h+='</table>';
    }else{h+='<div style="color:#8b949e;padding:20px;text-align:center">暂无数据</div>'}
    h+='</div>';

    // 热门个股（前10）
    h+=`<div class="section"><div class="sec-title">🔥 热门个股 <span class="cnt">${(d.hot_stocks||[]).length}/10</span></div>`;
    if((d.hot_stocks||[]).length){
        h+='<table><tr><th>#</th><th>股票</th><th>涨幅</th><th>价格</th><th>资金流入</th></tr>';
        d.hot_stocks.forEach((s,i)=>{
            const rc=i<3?('r'+(i+1)):'ro';
            h+=`<tr><td><span class="rank ${rc}">${i+1}</span></td><td><div class="ana-name">${s.name}</div><div style="color:#8b949e;font-size:11px">${s.code}</div></td><td><span class="${safeF(s.change_pct)>=0?'p-up':'p-down'}" style="font-size:15px">${fp(s.change_pct)}</span></td><td>¥${safeF(s.price).toFixed(2)}</td><td style="color:#58a6ff;font-weight:bold">${fm(s.capital_inflow)}</td></tr>`;
        });
        h+='</table>';
    }else{h+='<div style="color:#8b949e;padding:20px;text-align:center">暂无数据</div>'}
    h+='</div>';
    h+='</div>'; // end two-col

    // 第三行：资金流入前十 + 风险提示 + 预测
    h+='<div class="two-col">';
    
    // 资金流入个股前十
    h+=`<div class="section"><div class="sec-title">💰 资金流入个股前十</div>`;
    const ci=a.capital_inflow_stocks||[];
    if(ci.length){
        h+='<table><tr><th>#</th><th>股票</th><th>涨幅</th><th>资金净流入</th><th>换手率</th></tr>';
        ci.forEach((s,i)=>{
            const rc=i<3?('r'+(i+1)):'ro';
            h+=`<tr><td><span class="rank ${rc}">${i+1}</span></td><td><div class="ana-name">${s.name}</div><div style="color:#8b949e;font-size:11px">${s.code}</div></td><td class="${safeF(s.change_pct)>=0?'p-up':'p-down'}">${fp(s.change_pct)}</td><td style="color:#58a6ff;font-weight:bold">${fm(s.capital_inflow)}</td><td>${s.turnover||'-'}%</td></tr>`;
        });
        h+='</table>';
    }else{h+='<div style="color:#8b949e;padding:20px;text-align:center">暂无数据</div>'}
    h+='</div>';

    // 右栏：风险 + 预测
    h+='<div>';
    // 风险提示
    const risks=a.risk_warnings||[];
    h+=`<div class="section"><div class="sec-title">⚠️ 风险提示 <span class="cnt">${risks.length}</span></div>`;
    if(risks.length){
        risks.forEach(r=>{
            const cls=r.level==='高风险'?'risk-high':'risk-med';
            const lcls=r.level==='高风险'?'rl-high':'rl-med';
            h+=`<div class="risk-item ${cls}"><div><strong>${r.type}</strong>: ${r.stock}(${r.code})</div><div style="display:flex;align-items:center;gap:10px"><span style="font-size:12px;color:#c9d1d9">${r.reason}</span><span class="risk-level ${lcls}">${r.level}</span></div></div>`;
        });
    }else{
        h+='<div style="color:#8b949e;padding:15px;text-align:center">✅ 当前无明显风险信号</div>';
    }
    h+='</div>';

    // 预测明日
    const pred=a.prediction||{};
    const psecs=pred.predicted_sectors||[];
    const pstks=pred.predicted_stocks||[];
    h+=`<div class="section"><div class="sec-title">🔮 明日热点预测</div>`;
    if(psecs.length||pstks.length){
        if(psecs.length){
            h+='<div class="pred-box"><div class="pred-title">预测热门板块：</div>';
            psecs.forEach(s=>{h+=`<div class="ana-item"><div class="ana-name">${s.name} <span style="font-size:11px;background:#21262d;padding:2px 8px;border-radius:4px;color:#8b949e;margin-left:6px">${s.confidence}</span></div><div class="ana-reason">${s.reason||''}</div></div>`});
            h+='</div>';
        }
        if(pstks.length){
            h+='<div class="pred-box"><div class="pred-title">关注个股（前3）：</div>';
            pstks.forEach(s=>{h+=`<div class="pred-stock"><strong>${s.name}</strong><span style="color:#8b949e;font-size:11px;margin-left:4px">(${s.code})</span><div class="pred-conf">${s.reason||''} · 置信度:${s.confidence}</div></div>`});
            h+='</div>';
        }
        h+='<div style="color:#8b949e;font-size:11px;margin-top:8px;text-align:center;">⚡ 基于当前动量+资金流向的算法预测，仅供参考，不构成投资建议</div>';
    }else{
        h+='<div style="color:#8b949e;padding:15px;text-align:center">等待交易时间采集数据后生成预测</div>';
    }
    h+='</div>';
    h+='</div>'; // end right col

    h+='</div>'; // end two-col row 2

    document.getElementById('content').innerHTML=h;
}

function toggleSec(code){const el=document.getElementById('ds-'+code);if(el)el.style.display=el.style.display==='none'?'table-row':'none'}

function init(){loadData();setInterval(loadData,REFRESH)}
window.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
